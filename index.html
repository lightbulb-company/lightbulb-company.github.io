<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbulb Co.</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <style>
    :root {
      font-family: Inter, sans-serif;
      font-feature-settings: 'liga' 1, 'calt' 1;
    }
    @supports (font-variation-settings: normal) {
      :root { font-family: InterVariable, sans-serif; }
    }
    body {
      opacity: 0;
      transition: opacity 0.5s ease;
      user-select: none;
      height: 100dvh;
      margin: 0;
      background-color: #FAFAFA;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    body.loaded {
      opacity: 1;
    }
    .content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .footer {
      width: 100%;
      height: 4.5em;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .main-text {
      font-size: 1.7em;
      font-weight: 500;
      color: #222222;
      letter-spacing: 0.15em;
    }
    .bottom-text {
      font-size: 0.8em;
      font-weight: 300;
      color: #222222;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="main-text">LIGHTBULB</div>
  </div>
  <div class="footer">
    <div class="bottom-text">contact@lightbulbcompany.net</div>
  </div>
  <script>
    window.addEventListener('load', () => {
      document.fonts.ready.then(() => {
        document.body.classList.add('loaded');
      });
    });
  </script>
</body>
</html>
